<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FontForge — Stylish Font Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070810;
  --surface: rgba(255,255,255,0.03);
  --surface-2: rgba(255,255,255,0.055);
  --border: rgba(255,255,255,0.07);
  --border-2: rgba(255,255,255,0.12);
  --accent: #6ee7f7;
  --accent2: #a78bfa;
  --accent3: #f9a8d4;
  --text: #dde6ff;
  --text-2: rgba(180,200,255,0.55);
  --text-3: rgba(140,165,220,0.3);
  --r: 16px;
  --r-sm: 10px;
  --r-lg: 22px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--accent), var(--accent2)); border-radius: 99px; }

/* BG MESH */
body::after {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 800px 600px at 10% 5%, rgba(110,231,247,0.045) 0%, transparent 70%),
    radial-gradient(ellipse 700px 700px at 90% 90%, rgba(167,139,250,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 500px 400px at 50% 50%, rgba(249,168,212,0.025) 0%, transparent 70%);
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.018'/%3E%3C/svg%3E");
}

.container { position: relative; z-index: 1; max-width: 1160px; margin: 0 auto; padding: 0 18px; }

/* HEADER */
header {
  position: sticky; top: 0; z-index: 200;
  padding: 12px 0;
  background: rgba(7,8,16,0.75);
  backdrop-filter: blur(36px) saturate(1.4);
  -webkit-backdrop-filter: blur(36px) saturate(1.4);
  border-bottom: 1px solid var(--border);
}
.header-row { display: flex; align-items: center; gap: 12px; }

.logo { display: flex; align-items: center; gap: 9px; flex-shrink: 0; text-decoration: none; }
.logo-mark {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { width: 18px; height: 18px; color: #070810; }
.logo-name {
  font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.1rem;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 60%, var(--accent3) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.01em; white-space: nowrap;
}

.search-box { flex: 1; position: relative; min-width: 0; }
.search-box svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--text-3); pointer-events: none; }
#mainInput {
  width: 100%; padding: 11px 15px 11px 40px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r); color: var(--text);
  font-family: 'Space Grotesk', sans-serif; font-size: 0.92rem;
  outline: none; transition: border-color .22s, background .22s;
}
#mainInput::placeholder { color: var(--text-3); }
#mainInput:focus { border-color: rgba(110,231,247,0.3); background: rgba(255,255,255,0.05); }

.page-toggle {
  display: flex; gap: 3px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 4px; flex-shrink: 0;
}
.pg-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: calc(var(--r) - 4px);
  border: none; cursor: pointer; color: var(--text-2);
  background: transparent; font-family: 'Space Grotesk', sans-serif;
  font-size: 0.8rem; font-weight: 500; transition: all .22s; white-space: nowrap;
}
.pg-btn svg { width: 13px; height: 13px; }
.pg-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #070810; }

main { padding: 24px 0 16px; }

.page { display: none; animation: fadeIn .28s ease; }
.page.active { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* TABS */
.tab-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; align-items: center; }
.cat-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 13px; border-radius: 30px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text-2); cursor: pointer; font-size: 0.78rem;
  font-weight: 500; transition: all .2s;
  font-family: 'Space Grotesk', sans-serif;
}
.cat-tab svg { width: 12px; height: 12px; }
.cat-tab:hover { border-color: rgba(110,231,247,0.22); color: var(--text); }
.cat-tab.active { background: rgba(110,231,247,0.09); border-color: rgba(110,231,247,0.35); color: var(--accent); }

/* FONT GRID */
.font-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(285px, 1fr)); gap: 12px; }

.font-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 18px 18px 14px;
  display: flex; flex-direction: column; gap: 9px;
  transition: transform .22s ease, border-color .22s, background .22s;
  animation: cardIn .32s ease both;
  backdrop-filter: blur(12px);
  position: relative; overflow: hidden;
}
.font-card::before {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background: linear-gradient(135deg, rgba(110,231,247,0.035) 0%, transparent 55%);
  opacity: 0; transition: opacity .25s;
}
.font-card:hover { transform: translateY(-2px); border-color: rgba(110,231,247,0.18); background: var(--surface-2); }
.font-card:hover::before { opacity: 1; }
@keyframes cardIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.font-label {
  font-size: 0.66rem; font-weight: 600; letter-spacing: .07em;
  text-transform: uppercase; color: var(--text-3);
  display: flex; align-items: center; gap: 5px;
}
.cat-dot { width: 4px; height: 4px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
.font-preview {
  font-size: 1.2rem; line-height: 1.5; word-break: break-all;
  color: var(--text); min-height: 34px; flex: 1;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.font-actions { display: flex; align-items: center; justify-content: flex-end; gap: 5px; margin-top: 2px; }
.icon-btn {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text-2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .18s; position: relative; overflow: hidden;
}
.icon-btn svg { width: 13px; height: 13px; }
.icon-btn:hover { background: rgba(110,231,247,0.08); border-color: rgba(110,231,247,0.28); color: var(--accent); transform: scale(1.07); }
.icon-btn:active { transform: scale(0.92); }
.icon-btn.fav-on { color: var(--accent3); border-color: rgba(249,168,212,0.3); background: rgba(249,168,212,0.07); }

/* SYMBOL PAGE */
.sym-search-wrap { position: relative; max-width: 360px; margin-bottom: 18px; }
.sym-search-wrap svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-3); pointer-events: none; }
#symSearch {
  width: 100%; padding: 10px 15px 10px 40px;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--r); color: var(--text);
  font-family: 'Space Grotesk', sans-serif; font-size: 0.88rem;
  outline: none; transition: all .22s;
}
#symSearch::placeholder { color: var(--text-3); }
#symSearch:focus { border-color: rgba(110,231,247,0.3); }

.sym-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(66px, 1fr)); gap: 7px; }
.sym-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 12px 5px 9px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  cursor: pointer; transition: all .2s; animation: cardIn .28s ease both;
  text-align: center;
}
.sym-card:hover { background: rgba(110,231,247,0.07); border-color: rgba(110,231,247,0.25); transform: scale(1.06); }
.sym-char { font-size: 1.45rem; line-height: 1; color: var(--text); }
.sym-hint { font-size: 0.58rem; color: var(--text-3); }

/* TOAST */
#toast {
  position: fixed; top: 20px; right: 20px; z-index: 9999;
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  background: rgba(7,8,22,0.9); border: 1px solid rgba(110,231,247,0.25);
  border-radius: var(--r); color: var(--accent);
  font-size: 0.83rem; font-weight: 500;
  backdrop-filter: blur(20px);
  opacity: 0; transform: translateY(-12px) scale(0.95);
  transition: all .3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0) scale(1); }
#toast svg { width: 14px; height: 14px; flex-shrink: 0; }

.empty-state {
  grid-column: 1/-1; text-align: center;
  padding: 56px 20px; color: var(--text-3);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.empty-state svg { width: 36px; height: 36px; opacity: 0.2; }
.empty-state p { font-size: 0.88rem; }

/* FOOTER */
footer {
  position: relative; z-index: 1;
  margin-top: 48px;
  border-top: 1px solid var(--border);
  padding: 32px 0 24px;
}
.footer-inner {
  display: flex; flex-direction: column; align-items: center; gap: 20px;
}
.footer-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 22px 28px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  text-align: center; width: 100%; max-width: 520px;
  backdrop-filter: blur(10px);
}
.footer-logo { display: flex; align-items: center; gap: 8px; }
.footer-tagline { font-size: 0.8rem; color: var(--text-2); line-height: 1.6; max-width: 340px; }
.footer-author { font-size: 0.75rem; color: var(--text-3); }
.footer-author span { color: var(--accent); }

/* contact icons */
.footer-contacts {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.f-icon {
  width: 34px; height: 34px; border-radius: 9px;
  border: 1px solid var(--border); background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); text-decoration: none;
  transition: all .2s;
}
.f-icon svg { width: 14px; height: 14px; }
.f-icon:hover { background: rgba(110,231,247,0.08); border-color: rgba(110,231,247,0.28); color: var(--accent); transform: translateY(-2px); }

.footer-divider { width: 100%; height: 1px; background: var(--border); }
.footer-copy { font-size: 0.72rem; color: var(--text-3); text-align: center; }
.footer-pill {
  padding: 4px 12px; border-radius: 30px;
  background: rgba(110,231,247,0.08);
  border: 1px solid rgba(110,231,247,0.15); color: var(--accent);
  font-size: 0.68rem; font-weight: 600; letter-spacing: .04em;
}

/* RIPPLE */
.ripple-wave {
  position: absolute; border-radius: 50%;
  background: rgba(110,231,247,0.15);
  transform: scale(0); animation: ripple .45s ease-out forwards;
  pointer-events: none;
}
@keyframes ripple { to { transform: scale(5); opacity: 0; } }

@media (max-width: 640px) {
  .logo-name { display: none; }
  .pg-btn span { display: none; }
  .pg-btn { padding: 7px 10px; }
  .font-grid { grid-template-columns: 1fr; }
  .sym-grid { grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); }
  .footer-card { padding: 18px 16px; }
}
</style>
</head>
<body>

<div id="toast">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
  <span id="toastMsg">Copied!</span>
</div>

<header>
  <div class="container">
    <div class="header-row">
      <a href="#" class="logo">
        <div class="logo-mark">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        </div>
        <span class="logo-name">FontForge</span>
      </a>

      <div class="search-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="mainInput" type="text" placeholder="Type to preview all fonts..." value="FontForge" autocomplete="off" spellcheck="false">
      </div>

      <div class="page-toggle">
        <button class="pg-btn active" id="btnFonts" onclick="switchPage('fonts')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          <span>Fonts</span>
        </button>
        <button class="pg-btn" id="btnSymbols" onclick="switchPage('symbols')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><circle cx="12" cy="4" r="1.5"/><circle cx="12" cy="20" r="1.5"/><circle cx="4" cy="12" r="1.5"/><circle cx="20" cy="12" r="1.5"/></svg>
          <span>Symbols</span>
        </button>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="container">

    <div class="page active" id="pageFonts">
      <div class="tab-row" id="fontTabRow"></div>
      <div class="font-grid" id="fontGrid"></div>
    </div>

    <div class="page" id="pageSymbols">
      <div class="sym-search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="symSearch" type="text" placeholder="Search symbols..." autocomplete="off">
      </div>
      <div class="tab-row" id="symTabRow"></div>
      <div class="sym-grid" id="symGrid"></div>
    </div>

  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-inner">
      <div class="footer-card">
        <div class="footer-logo">
          <div class="logo-mark" style="width:30px;height:30px;border-radius:8px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#070810" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          </div>
          <span class="logo-name">FontForge</span>
        </div>
        <p class="footer-tagline">Premium font & symbol tools crafted for creators, devs & designers.</p>
        <div class="footer-divider"></div>
        <div class="footer-contacts" id="footerContacts"></div>
        <div class="footer-author">Built by <span>Md. Mainul Islam</span></div>
      </div>
      <div class="footer-copy" id="footerCopy"></div>
    </div>
  </div>
</footer>

<script>
function tr(text, map) {
  return [...text].map(c => map[c] !== undefined ? map[c] : c).join('');
}

const FONTS = [
  { name:'Bold Serif', cat:'Popular', fn:t=>tr(t,{a:'𝐚',b:'𝐛',c:'𝐜',d:'𝐝',e:'𝐞',f:'𝐟',g:'𝐠',h:'𝐡',i:'𝐢',j:'𝐣',k:'𝐤',l:'𝐥',m:'𝐦',n:'𝐧',o:'𝐨',p:'𝐩',q:'𝐪',r:'𝐫',s:'𝐬',t:'𝐭',u:'𝐮',v:'𝐯',w:'𝐰',x:'𝐱',y:'𝐲',z:'𝐳',A:'𝐀',B:'𝐁',C:'𝐂',D:'𝐃',E:'𝐄',F:'𝐅',G:'𝐆',H:'𝐇',I:'𝐈',J:'𝐉',K:'𝐊',L:'𝐋',M:'𝐌',N:'𝐍',O:'𝐎',P:'𝐏',Q:'𝐐',R:'𝐑',S:'𝐒',T:'𝐓',U:'𝐔',V:'𝐕',W:'𝐖',X:'𝐗',Y:'𝐘',Z:'𝐙',0:'𝟎',1:'𝟏',2:'𝟐',3:'𝟑',4:'𝟒',5:'𝟓',6:'𝟔',7:'𝟕',8:'𝟖',9:'𝟗'}) },
  { name:'Italic Serif', cat:'Popular', fn:t=>tr(t,{a:'𝑎',b:'𝑏',c:'𝑐',d:'𝑑',e:'𝑒',f:'𝑓',g:'𝑔',h:'ℎ',i:'𝑖',j:'𝑗',k:'𝑘',l:'𝑙',m:'𝑚',n:'𝑛',o:'𝑜',p:'𝑝',q:'𝑞',r:'𝑟',s:'𝑠',t:'𝑡',u:'𝑢',v:'𝑣',w:'𝑤',x:'𝑥',y:'𝑦',z:'𝑧',A:'𝐴',B:'𝐵',C:'𝐶',D:'𝐷',E:'𝐸',F:'𝐹',G:'𝐺',H:'𝐻',I:'𝐼',J:'𝐽',K:'𝐾',L:'𝐿',M:'𝑀',N:'𝑁',O:'𝑂',P:'𝑃',Q:'𝑄',R:'𝑅',S:'𝑆',T:'𝑇',U:'𝑈',V:'𝑉',W:'𝑊',X:'𝑋',Y:'𝑌',Z:'𝑍'}) },

function buildFontTabs() {
  document.getElementById('fontTabRow').innerHTML = fontCats.map(c=>
    `<button class="cat-tab${c===currentFontCat?' active':''}" onclick="setFontCat('${c}')">${catIcons[c]||''}${c}</button>`
  ).join('');
}
function setFontCat(cat) { currentFontCat=cat; buildFontTabs(); renderFontGrid(); }

function renderFontGrid() {
  const grid = document.getElementById('fontGrid');
  const text = inputText || 'FontForge';
  let filtered = FONTS;
  if(currentFontCat==='Favorites') filtered=FONTS.filter(f=>favorites.has(f.name));
  else if(currentFontCat!=='All') filtered=FONTS.filter(f=>f.cat===currentFontCat);
  if(filtered.length===0){
    grid.innerHTML=`<div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><p>No favorites yet. Click the ♡ on any card.</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map((font,i)=>{
    const preview=font.fn(text);
    const isFav=favorites.has(font.name);
    return `<div class="font-card" style="animation-delay:${Math.min(i*0.03,0.6)}s">
      <div class="font-label"><span class="cat-dot"></span>${font.name} · ${font.cat}</div>
      <div class="font-preview">${escHtml(preview)}</div>
      <div class="font-actions">
        <button class="icon-btn${isFav?' fav-on':''}" title="Favorite" onclick="toggleFav('${font.name}',this)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <button class="icon-btn" title="Copy" onclick="copyText('${escAttr(preview)}',this)">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function buildSymTabs() {
  document.getElementById('symTabRow').innerHTML = Object.keys(SYMBOLS).map(c=>
    `<button class="cat-tab${c===currentSymCat?' active':''}" onclick="setSymCat('${c}')">${symCatIcons[c]||''}${c}</button>`
  ).join('');
}
function setSymCat(cat) { currentSymCat=cat; buildSymTabs(); renderSymGrid(); }

let symFilter = '';
function renderSymGrid() {
  const grid = document.getElementById('symGrid');
  let syms = SYMBOLS[currentSymCat] || [];
  if(symFilter) {
    const q = symFilter.toLowerCase();
    syms = Object.entries(SYMBOLS).reduce((acc,[k,v])=>{v.forEach(s=>{if((s+k).toLowerCase().includes(q))acc.push(s);});return acc;},[]);
  }
  if(syms.length===0){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No symbols found.</p></div>`;
    return;
  }
  grid.innerHTML = syms.map((s,i)=>{
    const isInvis=(s.codePointAt(0)<33||[8203,8204,8205,8288,65279,6158,8232,8233,8239,8287,12288].includes(s.codePointAt(0)));
    const display=isInvis?`<span style="font-size:.55rem;color:var(--accent);opacity:.7">[invis]</span>`:`<span class="sym-char">${s}</span>`;
    return `<div class="sym-card" style="animation-delay:${Math.min(i*0.015,0.4)}s" onclick="copyText('${escAttr(s)}')" title="Click to copy">${display}<span class="sym-hint">copy</span></div>`;
  }).join('');
}

// COPY & TOAST
// ═══════════════════════════════════════════════════
let toastTimer;
function copyText(text,btn) {
  const decoded = text.replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  navigator.clipboard.writeText(decoded).then(()=>{
    showToast('Copied!');
    if(btn) addRipple(btn);
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=decoded;ta.style.cssText='position:fixed;opacity:0;';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);showToast('Copied!');
  });
}
function showToast(msg) {
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}
function addRipple(btn) {
  const r=document.createElement('span');
  r.className='ripple-wave';
  const rect=btn.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  r.style.cssText=`width:${size}px;height:${size}px;left:${rect.width/2-size/2}px;top:${rect.height/2-size/2}px`;
  btn.appendChild(r);
  setTimeout(()=>r.remove(),500);
}

function toggleFav(name,btn) {
  if(favorites.has(name)){
    favorites.delete(name);btn.classList.remove('fav-on');btn.querySelector('svg').setAttribute('fill','none');showToast('Removed from favorites');
  } else {
    favorites.add(name);btn.classList.add('fav-on');btn.querySelector('svg').setAttribute('fill','currentColor');showToast('Added to favorites');
  }
  localStorage.setItem('ffx_favs',JSON.stringify([...favorites]));
  if(currentFontCat==='Favorites') renderFontGrid();
}
